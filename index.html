<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AI-Powered Staking</title>
    <link href="output.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animated-fade {
            animation: fadeIn 1s ease-out forwards;
        }
        .animated-delay-1 { animation-delay: 0.2s; }
        .animated-delay-2 { animation-delay: 0.4s; }
        .animated-delay-3 { animation-delay: 0.6s; }
        
        .hero-description {
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="relative min-h-screen overflow-hidden text-gray-600 bg-gradient-to-br from-gray-100 to-gray-50">
    <div class="absolute inset-0 -z-10 pointer-events-none">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-5"></div>
        <div class="absolute top-[-100px] left-[-100px] w-[300px] h-[300px] bg-purple-400 rounded-full blur-3xl opacity-30"></div>
        <div class="absolute bottom-[-80px] right-[-80px] w-[250px] h-[250px] bg-blue-400 rounded-full blur-2xl opacity-20"></div>
        <div class="absolute top-1/4 left-0 w-full h-[1px] bg-gradient-to-r from-purple-500 via-transparent to-blue-300 opacity-40"></div>
        <div class="absolute top-2/3 right-0 w-full h-[1px] bg-gradient-to-l from-blue-500 via-transparent to-purple-300 opacity-30"></div>
    </div>
    <nav id="navbar" class="sticky top-0 z-50 bg-white transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <a href="#" class="text-xl font-semibold"><img class="h-8" src="p-logo.png" alt="" /></a>
                    </div>
                </div>
                <div class="flex items-center">
                    <div class="hidden md:flex space-x-12">
                        <a href="#link1" class="text-gray-800 hover:text-gray-600">The Rave Token</a>
                        <a href="#link2" class="text-gray-800 hover:text-gray-600">FAQ</a>
                        <a href="#link3" class="text-gray-800 hover:text-gray-600">About</a>
                    </div>
                    <div class="-mr-2 flex md:hidden">
                        <button id="mobile-menu-button" type="button" class="inline-flex items-center justify-center p-2 rounded-md text-gray-800 hover:text-gray-600 focus:outline-none">
                            <span class="sr-only">Toggle menu</span>
                            <svg id="icon-hamburger" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 block" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                            <svg id="icon-close" xmlns="http://www.w3.org/20-0/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="md:hidden hidden" id="mobile-menu">
            <div class="px-2 pt-2 pb-3 space-y-3 sm:px-3">
                <a href="#link1" class="block px-4 py-2 text-base font-medium text-gray-800 hover:bg-gray-100">The Rave Token</a>
                <a href="#link2" class="block px-4 py-2 text-base font-medium text-gray-800 hover:bg-gray-100">FAQ</a>
                <a href="#link3" class="block px-4 py-2 text-base font-medium text-gray-800 hover:bg-gray-100">About</a>
            </div>
        </div>
    </nav>
    <main class="relative z-10 flex flex-col items-center justify-center text-center px-6 py-24 sm:py-32">
        <div class="animated-fade">
            <h1 class="hero-title text-6xl md:text-8xl font-bold mb-4">AI-Powered Staking</h1>
        </div>
        <div class="animated-fade animated-delay-1">
            <p class="hero-description text-md md:text-xl font-normal text-gray-400 mb-8 text-center">Grow Your Assets with AI-Driven Precision. Smart, Secure, and Profitable.</p>
        </div>
        <div class="animated-fade animated-delay-2 w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 relative">
            <div class="relative z-10">
                <div class="relative mb-4">
                    <input type="email" placeholder="Enter your email" class="w-full bg-white rounded-xl py-3 px-4 border border-gray-300 focus:outline-none focus:ring-1 focus:ring-purple-400 transition-shadow duration-300 shadow-sm hover:shadow-md" />
                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                    </div>
                </div>
                <button class="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 rounded-xl py-3 font-semibold text-white transition-transform duration-300 transform hover:scale-105">Join Waitlist</button>
            </div>
        </div>
        <div class="animated-fade animated-delay-3">
            <p class="text-xs text-gray-500 mt-8 text-center pt-4">By signing up, you agree to our <a href="#" class="text-blue-400 hover:underline">Waitlist</a> and <a href="#" class="text-blue-400 hover:underline">Referral Program Terms</a>.</p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>

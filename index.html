<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Design System Waitlist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .star {
      position: absolute;
      border-radius: 9999px;
      background: white;
      opacity: 0.3;
      z-index: 0;
      box-shadow: 0 0 0.2px 0.1px white;
      animation: twinkle 5s infinite ease-in-out, drift 20s infinite linear;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.4); }
    }
    @keyframes drift {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-10px); }
    }
    .navbar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      z-index: 20;
    }
    .navbar-logo {
        font-size: 1.5rem;
        font-weight: bold;
        color: white;
    }
  </style>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center relative overflow-hidden">
  <div id="starfield" class="absolute inset-0 z-0 pointer-events-none"></div>
  <div class="absolute inset-0 pointer-events-none z-0 bg-gradient-to-br from-transparent to-[#1a1a1a]"></div>

  <nav class="navbar">
    <img class="w-32" src="ravees.svg" alt="">
    <button class="bg-white/5 border border-white/10 px-3 py-1.5 text-sm rounded-md hover:bg-white/10 transition">Updates</button>
  </nav>

  <div class="z-10 text-center space-y-2 max-w-md px-6">
    <div class="flex justify-center">
      <div class="w-32 h-32 flex items-center justify-center">
        <img class="" src="holl.png" alt="">
      </div>
    </div>
    <div>
      <h1 class="text-6xl md:text-6xl lg:text-7xl font-semibold flex flex-wrap justify-center whitespace-nowrap">
        <span class="bg-gradient-to-r from-[#00FFFF] to-blue-600 text-transparent bg-clip-text p-2">AI-Powered</span>
        <span class="bg-gradient-to-b from-gray-600 to-white text-transparent bg-clip-text p-2">Staking!</span>
      </h1>
      <p class="text-lg text-gray-300 max-w-lg mx-auto pt-6">Grow Your Assets with AI-Driven Precision. Smart, Secure, and Profitable.</p>
    </div>
    <form class="space-y-4">
      <input type="text" placeholder="Full name..." class="w-full bg-white/5 border border-white/10 text-white px-4 py-3 rounded-md placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-pink-500">
      <input type="email" placeholder="Email address..." class="w-full bg-white/5 border border-white/10 text-white px-4 py-3 rounded-md placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-pink-500">
      <button type="submit" class="w-full flex items-center justify-center bg-gradient-to-r from-[#00FFFF] to-blue-600 hover:opacity-90 text-white px-4 py-3 rounded-md transition">
        Join Waitlist <span class="ml-2">→</span>
      </button>
    </form>
    <div class="text-xs text-gray-500">
      <p class="mt-8 text-center pt-4">By signing up, you agree to our <a href="#" class="text-blue-400 hover:underline">Waitlist</a> and <a href="#" class="text-blue-400 hover:underline">Referral Program Terms</a>.</p>
    </div>
  </div>

  <script>
    const container = document.getElementById('starfield');
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      const size = Math.random() * 2 + 1;
      star.className = 'star';
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;
      star.style.top = `${Math.random() * 100}%`;
      star.style.left = `${Math.random() * 100}%`;
      star.style.animationDuration = `${1.5 + Math.random() * 2}s, ${15 + Math.random() * 10}s`;
      star.style.animationDelay = `${Math.random() * 5}s, ${Math.random() * 10}s`;
      container.appendChild(star);
    }
  </script>
</body>
</html>

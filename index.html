<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earn Rave Waitlist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    html, body {
      overflow-x: hidden;
    }
    body {
      font-family: 'Inter', sans-serif;
    }
    .star {
      background-color: white;
      border-radius: 50%;
      position: absolute;
      animation: twinkling 2s infinite, move 10s infinite;
    }
    @keyframes twinkling {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }
    @keyframes move {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); } /* reduced movement */
    }
    [data-animate] {
      opacity: 0;
      transform: translateY(20px);
    }
  </style>
  
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center relative overflow-hidden">

  <div id="starfield" class="absolute inset-0 z-0 pointer-events-none"></div>
  <div class="absolute inset-0 z-0 bg-gradient-to-br from-transparent to-[#1a1a1a] pointer-events-none"></div>

  <nav class="navbar fixed top-0 left-0 w-full flex justify-between items-center py-4 px-6 z-20">
    <img class="w-32" src="logo.svg" alt="">
    <a href="faq.html" class="bg-white/5 border border-white/10 px-3 py-1.5 text-sm rounded-md hover:bg-white/10 transition">FAQ</a>
  </nav>

  <div class="z-10 text-center space-y-10 max-w-md px-6 mt-20">
    <div data-animate data-delay="100">
      <div class="flex justify-center">
        <div class="w-32 h-32 flex items-center justify-center duration-1000 ease-out">
          <img src="holl.png" alt="">
        </div>
      </div>
    </div>

    <div data-animate data-delay="300">
      <h1 class="text-6xl md:text-6xl lg:text-7xl font-semibold flex flex-wrap justify-center whitespace-nowrap">
        <span class="bg-gradient-to-r from-[#00FFFF] to-blue-600 text-transparent bg-clip-text p-2">AI-Powered</span>
        <span class="bg-gradient-to-b from-gray-600 to-white text-transparent bg-clip-text p-2">Staking!</span>
      </h1>
      <p class="text-md text-gray-300 max-w-lg mx-auto py-6">
        Grow Your Assets with AI-Driven Precision. Smart, Secure, and Profitable.
      </p>
    </div>

    <form id="waitlistForm" class="space-y-4" data-animate data-delay="500">
      <input 
        type="text" 
        id="name" 
        placeholder="Full name" 
        class="w-full bg-white/5 border border-white/10 text-white px-4 py-3 rounded-md placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-500 font-light text-md"
        required
      />
      <input 
        type="email" 
        id="email" 
        placeholder="Email address" 
        class="w-full bg-white/5 border border-white/10 text-white px-4 py-3 rounded-md placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-500 font-light text-md"
        required
      />
      <div class="relative">
        <input 
          type="password" 
          id="password" 
          placeholder="Password"
          class="w-full bg-white/5 border border-white/10 text-white px-4 py-3 rounded-md placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-500 font-light text-md"
          required
        />
        <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 px-4 flex items-center text-gray-400 hover:text-white focus:outline-none focus:shadow-outline">
          Show
        </button>
      </div>      

      <button 
        type="submit" 
        class="w-full flex items-center justify-center bg-gradient-to-r from-[#00FFFF] to-blue-600 hover:opacity-90 text-white px-4 py-3 rounded-md transition">
        Join Waitlist <span class="ml-2">&rarr;</span>
      </button>

      <a 
        href="sign-in.html"
        class="block w-full text-center bg-white/5 border border-white/10 hover:bg-white/10 text-white px-4 py-3 rounded-md transition">
        Sign In
      </a>
    </form>

    <div class="text-xs text-gray-500 mt-8" data-animate data-delay="400">
      <p class="text-center">
        By signing up, you agree to our <a href="#" class="text-blue-400 hover:underline">Waitlist</a> and <a href="#" class="text-blue-400 hover:underline">Referral Program Terms</a>.
      </p>
    </div>
  </div>

  <script>
    const container = document.getElementById('starfield');
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      const size = Math.random() * 2 + 1;
      star.className = 'star';
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;
      star.style.top = `${Math.random() * 100}%`;
      star.style.left = `${Math.random() * 100}%`;
      star.style.animationDuration = `${1.5 + Math.random() * 2}s, ${15 + Math.random() * 10}s`;
      container.appendChild(star);
    }

    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', () => {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        togglePassword.textContent = 'Hide';
      } else {
        passwordInput.type = 'password';
        togglePassword.textContent = 'Show';
      }
    });

    document.getElementById('waitlistForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!emailRegex.test(email)) {
        alert('Please enter a valid email address.');
        return;
      }

      const data = { email, password };
      const apiUrl = 'https://pure-sea-47438-9b41a08c5720.herokuapp.com';

      fetch(`${apiUrl}/users`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      })
      .then(res => res.ok ? res.json() : res.json().then(err => { throw new Error(err.message); }))
      .then(response => {
        localStorage.setItem('referralCode', response.referral_code);
        window.location.href = 'waitlist.html';
      })
      .catch(error => alert(error.message || 'Something went wrong'));
    });

    const animatedElements = document.querySelectorAll('[data-animate]');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const el = entry.target;
          el.style.transition = 'opacity 1s ease-out, transform 1s ease-out';
          el.style.opacity = 1;
          el.style.transform = 'translateY(0)';
          observer.unobserve(el);
        }
      });
    }, { threshold: 0.1 });

    animatedElements.forEach(el => observer.observe(el));
  </script>
</body>
</html>
